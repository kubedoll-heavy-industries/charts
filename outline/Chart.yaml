# Bundled subcharts (Bitnami redis/postgresql, MinIO) removed — haruspex
# brings its own external Postgres (CNPG), Redis (Dragonfly), and S3
# (RustFS). This also sidesteps Bitnami's recent licensing changes.
# The chart's templates already gate these behind `*.enabled` conditions
# which default to false; the subchart references in Chart.yaml were the
# only thing pulling them at `helm dep update` time.
