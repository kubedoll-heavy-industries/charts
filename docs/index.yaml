  terraria-tshock:
  - apiVersion: v2
    appVersion: 6.1.0
    created: "2026-05-28T17:59:53.93958-03:00"
    description: 'Minimal opinionated Helm chart for TShock (Terraria server mod)
      on Kubernetes. Pairs with the hardened image at ghcr.io/kubedoll-heavy-industries/terraria-tshock.
      Replaces the truecharts terraria-tshock chart with a single-purpose chart that
      doesn''t need ich777-image wrapper scripts, doesn''t emit chowner init containers,
      runs the workload as uid 1000 from PID 1, and exposes only the surface Terraria
      actually needs. '
    digest: 181599c9c9202c607d5b53af1540712b80810c18ca6dc86058ccd14be2e2fbf3
